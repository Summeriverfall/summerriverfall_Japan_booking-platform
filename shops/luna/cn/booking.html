<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约 — Luna spa 河原町店</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>:root { --font-sans: 'Noto Sans SC', sans-serif; }</style>
</head>
<body class="booking-page">

  <nav class="nav nav--scrolled">
    <a href="index.html" class="nav-logo">Luna spa 河原町店</a>
    <div class="nav-right">
      <div class="nav-lang">
        <a href="booking.html" class="is-active">中</a>
        <a href="../en/booking.html">英</a>
        <a href="../jp/booking.html">日</a>
      </div>
    </div>
  </nav>

  <main class="booking-main">
    <a href="index.html" class="booking-back">← 返回菜单</a>
    <div class="booking-card">
      <h1 class="booking-title">预约</h1>
      <p class="booking-sub">请填写以下表单完成预约</p>

      <form id="booking-form" class="booking-form">
        <div class="form-group">
          <label for="service">服务项目 <span class="req">*</span></label>
          <select id="service" name="service" required>
            <option value="芳香奢华 - ¥24,800">芳香奢华 - ¥24,800</option>
            <option value="芳香尊享 - ¥20,800">芳香尊享 - ¥20,800</option>
            <option value="身体·头部 - ¥13,800">身体·头部 - ¥13,800</option>
            <option value="身体·足部 - ¥13,800">身体·足部 - ¥13,800</option>
            <option value="芳香·头部 - ¥16,800">芳香·头部 - ¥16,800</option>
            <option value="芳香·足部 - ¥16,800">芳香·足部 - ¥16,800</option>
            <option value="按摩 60分钟 - ¥8,800">按摩 60分钟 - ¥8,800</option>
            <option value="按摩 90分钟 - ¥12,800">按摩 90分钟 - ¥12,800</option>
            <option value="按摩 120分钟 - ¥16,800">按摩 120分钟 - ¥16,800</option>
            <option value="芳香精油疗法 60分钟 - ¥11,800">芳香精油疗法 60分钟 - ¥11,800</option>
            <option value="芳香精油疗法 90分钟 - ¥15,800">芳香精油疗法 90分钟 - ¥15,800</option>
            <option value="芳香精油疗法 120分钟 - ¥19,800">芳香精油疗法 120分钟 - ¥19,800</option>
            <option value="头部水疗 30分钟 - ¥5,800">头部水疗 30分钟 - ¥5,800</option>
            <option value="头部水疗 45分钟 - ¥7,800">头部水疗 45分钟 - ¥7,800</option>
            <option value="足部护理 30分钟 - ¥5,800">足部护理 30分钟 - ¥5,800</option>
            <option value="足部护理 45分钟 - ¥7,800">足部护理 45分钟 - ¥7,800</option>
          </select>
        </div>

        <div class="form-group">
          <label for="date">预约日期 <span class="req">*</span></label>
          <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
          <label for="time">预约时间 <span class="req">*</span></label>
          <input type="time" id="time" name="time" required>
        </div>

        <div class="form-group">
          <label for="guests">人数 <span class="req">*</span></label>
          <select id="guests" name="guests" required>
            <option value="">请选择人数</option>
            <option value="1 位">1 位</option>
            <option value="2 位">2 位</option>
            <option value="3 位">3 位</option>
            <option value="4 位">4 位</option>
            <option value="5 位及以上">5 位及以上</option>
          </select>
        </div>

        <div class="form-group">
          <label for="name">姓名 <span class="req">*</span></label>
          <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
        </div>

        <button type="submit" class="booking-submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          通过 WhatsApp 提交预约
        </button>
      </form>
    </div>
  </main>

  <script src="../booking.js"></script>
</body>
</html>
