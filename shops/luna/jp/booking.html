<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご予約 — Luna spa 河原町店</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="booking-page">

  <nav class="nav nav--scrolled">
    <a href="index.html" class="nav-logo">Luna spa 河原町店</a>
    <div class="nav-right">
      <div class="nav-lang">
        <a href="../cn/booking.html">中</a>
        <a href="../en/booking.html">英</a>
        <a href="booking.html" class="is-active">日</a>
      </div>
    </div>
  </nav>

  <main class="booking-main">
    <a href="index.html" class="booking-back">← メニューに戻る</a>
    <div class="booking-card">
      <h1 class="booking-title">ご予約</h1>
      <p class="booking-sub">以下のフォームにご記入ください</p>

      <form id="booking-form" class="booking-form">
        <div class="form-group">
          <label for="service">サービス <span class="req">*</span></label>
          <select id="service" name="service" required>
            <option value="Aroma Luxury - ¥24,800">Aroma Luxury - ¥24,800</option>
            <option value="アロマプレミアム - ¥20,800">アロマプレミアム - ¥20,800</option>
            <option value="Body & Head - ¥13,800">Body & Head - ¥13,800</option>
            <option value="Body & Foot - ¥13,800">Body & Foot - ¥13,800</option>
            <option value="Aroma & Head - ¥16,800">Aroma & Head - ¥16,800</option>
            <option value="Aroma & Foot - ¥16,800">Aroma & Foot - ¥16,800</option>
            <option value="全身もみほぐし 60分 - ¥8,800">全身もみほぐし 60分 - ¥8,800</option>
            <option value="全身もみほぐし 90分 - ¥12,800">全身もみほぐし 90分 - ¥12,800</option>
            <option value="全身もみほぐし 120分 - ¥16,800">全身もみほぐし 120分 - ¥16,800</option>
            <option value="アロマオイルトリートメント 60分 - ¥11,800">アロマオイルトリートメント 60分 - ¥11,800</option>
            <option value="アロマオイルトリートメント 90分 - ¥15,800">アロマオイルトリートメント 90分 - ¥15,800</option>
            <option value="アロマオイルトリートメント 120分 - ¥19,800">アロマオイルトリートメント 120分 - ¥19,800</option>
            <option value="ヘッドスパ 30分 - ¥5,800">ヘッドスパ 30分 - ¥5,800</option>
            <option value="ヘッドスパ 45分 - ¥7,800">ヘッドスパ 45分 - ¥7,800</option>
            <option value="フットセラピー 30分 - ¥5,800">フットセラピー 30分 - ¥5,800</option>
            <option value="フットセラピー 45分 - ¥7,800">フットセラピー 45分 - ¥7,800</option>
          </select>
        </div>

        <div class="form-group">
          <label for="date">予約日 <span class="req">*</span></label>
          <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
          <label for="time">予約時間 <span class="req">*</span></label>
          <input type="time" id="time" name="time" required>
        </div>

        <div class="form-group">
          <label for="guests">人数 <span class="req">*</span></label>
          <select id="guests" name="guests" required>
            <option value="">人数を選択</option>
            <option value="1名">1名</option>
            <option value="2名">2名</option>
            <option value="3名">3名</option>
            <option value="4名">4名</option>
            <option value="5名以上">5名以上</option>
          </select>
        </div>

        <div class="form-group">
          <label for="name">お名前 <span class="req">*</span></label>
          <input type="text" id="name" name="name" placeholder="お名前を入力" required>
        </div>

        <button type="submit" class="booking-submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsAppで予約を送信
        </button>
      </form>
    </div>
  </main>

  <script src="../booking.js"></script>
</body>
</html>
