<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>方案 E · 底部操作栏</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo.css">
</head>
<body>
  <div class="phone-shell has-dock">
    <header class="demo-top">
      <div class="scheme">方案 E</div>
      <h1>底栏快捷操作</h1>
      <div class="sub">单手拇指区 · 弹层完成关床</div>
      <nav class="demo-nav" id="nav"></nav>
    </header>
    <div class="pad">
      <div class="card">
        <h2>今日摘要</h2>
        <p class="hint"><span class="lg b"></span>预约 1 · <span class="lg g"></span>关闭 1 · <span class="lg t"></span>开床申请 1</p>
        <div class="list-item" style="margin-top:10px">
          <div class="t">待处理申请</div>
          <div class="m">4号床 16:00–17:00 · 客人指定</div>
          <div class="actions">
            <button type="button" class="btn primary" id="btnOk">同意</button>
            <button type="button" class="btn danger" id="btnNo">拒绝</button>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>占用缩略（只读）</h2>
        <div id="mini"></div>
      </div>
    </div>

    <nav class="dock" id="dock">
      <button type="button" data-a="day"><span class="ico">⛔</span>整日关</button>
      <button type="button" data-a="range"><span class="ico">⏱</span>关时段</button>
      <button type="button" data-a="req"><span class="ico">✉</span>申请</button>
    </nav>
  </div>

  <div class="sheet" id="sheet">
    <div class="sheet-panel">
      <h3 id="sheetTitle">关床</h3>
      <div id="sheetBody"></div>
      <div class="btn-row" style="margin-top:12px">
        <button type="button" class="btn" id="sheetCancel">取消</button>
        <button type="button" class="btn primary" id="sheetOk">确认</button>
      </div>
    </div>
  </div>

  <script src="demo-common.js"></script>
  <script>
    const { BEDS, STATE, slotCount, toast, navHtml } = MobileDemo;
    document.getElementById('nav').innerHTML = navHtml('e-dock.html');
    const n = slotCount();
    document.getElementById('mini').innerHTML = BEDS.map((name, bi) => {
      const row = STATE[bi] || {};
      let slots = '';
      for (let i = 0; i < Math.min(n, 28); i++) {
        const v = row[i];
        let cls = 'slot';
        if (v === 1) cls += ' booked';
        if (v === 2) cls += ' closed';
        if (v === 3) cls += ' request';
        slots += `<div class="${cls}" style="height:32px;flex-basis:22px;pointer-events:none"></div>`;
      }
      return `<div style="margin-bottom:6px"><div class="hint">${name}</div><div class="slot-grid">${slots}</div></div>`;
    }).join('');

    const sheet = document.getElementById('sheet');
    const sheetBody = document.getElementById('sheetBody');
    const sheetTitle = document.getElementById('sheetTitle');
    let mode = '';

    function openSheet(m) {
      mode = m;
      document.querySelectorAll('#dock button').forEach((b) => b.classList.toggle('on', b.dataset.a === m));
      if (m === 'day') {
        sheetTitle.textContent = '整日关床';
        sheetBody.innerHTML = `
          <div class="field"><label>床位</label>
            <select id="sBed">${BEDS.map((n, i) => `<option value="${i}">${n}</option>`).join('')}</select>
          </div>
          <p class="hint">将关闭营业时段 12:00 – 次日 02:00</p>`;
      } else if (m === 'range') {
        sheetTitle.textContent = '关闭时段';
        sheetBody.innerHTML = `
          <div class="field"><label>床位</label>
            <select id="sBed">${BEDS.map((n, i) => `<option value="${i}">${n}</option>`).join('')}</select>
          </div>
          <div class="field"><label>开始</label><input type="time" id="sStart" value="18:00"></div>
          <div class="field"><label>结束</label><input type="time" id="sEnd" value="19:00"></div>`;
      } else {
        sheetTitle.textContent = '开床申请';
        sheetBody.innerHTML = `<p class="hint">当前 1 条待处理（见上方摘要）。也可从列表同意/拒绝。</p>`;
      }
      sheet.classList.add('show');
    }

    document.getElementById('dock').onclick = (e) => {
      const b = e.target.closest('[data-a]');
      if (b) openSheet(b.dataset.a);
    };
    document.getElementById('sheetCancel').onclick = () => {
      sheet.classList.remove('show');
      document.querySelectorAll('#dock button').forEach((b) => b.classList.remove('on'));
    };
    sheet.addEventListener('click', (e) => {
      if (e.target === sheet) document.getElementById('sheetCancel').click();
    });
    document.getElementById('sheetOk').onclick = () => {
      toast('演示：已确认「' + sheetTitle.textContent + '」');
      document.getElementById('sheetCancel').click();
    };
    document.getElementById('btnOk').onclick = () => toast('演示：同意开床');
    document.getElementById('btnNo').onclick = () => toast('演示：拒绝申请');
  </script>
</body>
</html>
