<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>店舗側</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="page-merchant">
  <header class="topbar">
    <div class="brand" id="pageBrand">店舗側<div class="hint" style="margin:0" id="pageSub">…</div></div>
    <div class="topbar-right">
      <div class="lang-switch" id="langSwitch" role="group" aria-label="Language">
        <button type="button" data-lang="jp">JP</button>
        <button type="button" data-lang="cn">中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <div class="field"><label data-i18n="businessDay">営業日</label><input type="date" id="dateInput"></div>
      <button class="btn" type="button" id="btnRefresh" data-i18n="refreshBoard">ボード更新</button>
      <span class="hint" id="remainHint"></span>
    </div>

    <section class="card" id="mSummaryCard">
      <h2 data-i18n="todaySummary">本日の要約</h2>
      <p class="hint" id="mSummaryHint">—</p>
      <div class="summary-stats" id="summaryStats"></div>
      <div id="mPendingRequests"></div>
    </section>

    <div class="grid-stack">
      <section class="card card-board desk-only">
        <h2 data-i18n="boardTitle">リソース時間軸（開閉）</h2>
        <p class="hint" data-i18n="boardHint">左側「关/开」说明</p>
        <div class="board-legend" style="margin-bottom:.65rem">
          <span><i class="lg booking"></i><span data-i18n="legendBooking">確定予約</span></span>
          <span><i class="lg pending"></i><span data-i18n="legendPending">未確定</span></span>
          <span><i class="lg hold"></i><span data-i18n="legendHold">仮押さえ</span></span>
          <span><i class="lg closure"></i><span data-i18n="legendClosure">店舗クローズ</span></span>
          <span><i class="lg" style="background:var(--teal-request)"></i><span data-i18n="legendOpenReq">オープン申請</span></span>
        </div>
        <div id="board"></div>
      </section>

      <section class="card card-board m-only">
        <h2 data-i18n="timelineTitle">占用タイムテーブル</h2>
        <p class="hint" id="mTimelineHint" data-i18n="timelineHint">点资源旁…</p>
        <div class="board-legend" style="margin-bottom:.55rem">
          <span><i class="lg booking"></i><span data-i18n="legendBookingShort">確定</span></span>
          <span><i class="lg pending"></i><span data-i18n="legendPending">未確定</span></span>
          <span><i class="lg hold"></i><span data-i18n="legendHold">仮押さえ</span></span>
          <span><i class="lg closure"></i><span data-i18n="legendClosure">店舗クローズ</span></span>
          <span><i class="lg" style="background:var(--teal-request)"></i><span data-i18n="legendOpenReq">オープン申請</span></span>
        </div>
        <div class="m-timeline" id="mTimeline"></div>
      </section>

      <section class="card">
        <h2 data-i18n="todayBookings">本日の予約一覧</h2>
        <p class="hint" data-i18n="todayBookingsHint">按到店时间排序</p>
        <div class="list" id="bookingListToday"></div>
      </section>

      <section class="card">
        <h2 data-i18n="occTitle">当日占用（時間順）</h2>
        <p class="hint" data-i18n="occHint">预约与关闭混排</p>
        <div class="occ-strip" id="occStrip"></div>
      </section>

      <section class="card card-form">
        <h2 data-i18n="closureRecords">当日クローズ記録</h2>
        <p class="hint desk-only" data-i18n="closureHintDesk">整日关 / 时段关</p>
        <p class="hint m-only" data-i18n="closureHintMobile">列表可分别释放</p>
        <div class="list" id="closureList"></div>
        <div class="err" id="formErr"></div>
      </section>
    </div>
  </main>

  <nav class="m-dock m-only" id="mDock" aria-label="dock">
    <button type="button" data-dock="day" id="dockDay"><span class="m-dock-ico">⛔</span><span data-i18n="dockDay">終日閉</span></button>
    <button type="button" data-dock="range" id="dockRange"><span class="m-dock-ico">⏱</span><span data-i18n="dockRange">時間帯閉</span></button>
    <button type="button" data-dock="req" id="dockReq"><span class="m-dock-ico">✉</span><span data-i18n="dockReq">申請</span></button>
  </nav>

  <div class="ctx-menu" id="sidePanel" aria-hidden="true" hidden>
    <div class="ctx-menu-head">
      <div>
        <strong id="sideTitle" data-i18n="sideCloseEdit">クローズ編集</strong>
        <p class="hint" id="sideHint" style="margin:0" data-i18n="sideHintConfirm">選中后</p>
      </div>
      <button type="button" class="side-x m-only" id="btnSheetClose" aria-label="close">×</button>
    </div>
    <div class="ctx-menu-body" id="sideBodyForm">
      <div class="side-field"><label data-i18n="sideStart">開始</label><input id="startTime" type="time" step="1800"></div>
      <div class="side-field"><label data-i18n="sideEnd">終了</label><input id="endTime" type="time" step="1800"></div>
      <div class="side-field"><label data-i18n="sideWhichBeds">閉じるリソース</label><div class="bed-checks" id="sideBeds"></div></div>
      <div class="side-field">
        <label data-i18n="sideReason">理由</label>
        <div class="reason-chips" id="reasonChips">
          <button type="button" data-reason="临时关闭" data-i18n="reasonTemp">臨時クローズ</button>
          <button type="button" data-reason="线下客户占用" data-i18n="reasonWalkin">来店客占用</button>
          <button type="button" data-reason="设备维护" data-i18n="reasonMaint">設備メンテ</button>
          <button type="button" data-reason="店员休息" data-i18n="reasonRest">スタッフ休憩</button>
          <button type="button" data-reason="其他" data-i18n="reasonOther">その他</button>
        </div>
        <input id="reasonOther" type="text" data-i18n-placeholder="reasonOtherPh" placeholder="その他" hidden style="margin-top:.4rem;width:100%;border:1px solid var(--line);border-radius:8px;padding:.45rem .6rem;font:inherit">
        <input id="reason" type="hidden" value="临时关闭">
      </div>
      <p class="hint warn" id="openReqHint" hidden style="margin:0" data-i18n="openReqHint">客服已申请开床</p>
      <div class="err" id="sideErr"></div>
    </div>
    <div class="ctx-menu-body" id="sideBodyBooking" hidden>
      <div id="sideBookingDetail" class="hint" style="margin:0;line-height:1.55"></div>
    </div>
    <div class="ctx-menu-body" id="sideBodyRequests" hidden>
      <div id="sideRequestList"></div>
      <div class="err" id="sideReqErr"></div>
    </div>
    <div class="ctx-menu-foot">
      <button type="button" class="btn primary" id="btnClose" data-i18n="btnConfirmClose">クローズ確定</button>
      <button type="button" class="btn danger" id="btnRelease" hidden data-i18n="btnRelease">開く（解除）</button>
      <button type="button" class="btn primary" id="btnApproveOpen" hidden data-i18n="btnApprove">承認して開く</button>
      <button type="button" class="btn" id="btnRejectOpen" hidden data-i18n="btnReject">申請を拒否</button>
    </div>
  </div>
  <div class="m-sheet-scrim m-only" id="mSheetScrim" hidden></div>

  <script src="stores.js"></script>
  <script src="store.js"></script>
  <script src="desk-i18n.js"></script>
  <script src="board-render.js"></script>
  <script src="merchant-app.js"></script>
</body>
</html>
