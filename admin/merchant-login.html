<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗ログイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body class="portal-body">
  <div class="portal-bg" aria-hidden="true"></div>
  <main class="portal-shell portal-shell-narrow">
    <header class="portal-hero portal-hero-sm">
      <div class="portal-top-actions" id="portalLangMount"></div>
      <a class="back-link" href="index.html" data-i18n="backHub">← 入口へ戻る</a>
      <p class="eyebrow">Merchant</p>
      <h1 data-i18n="merchantLoginTitle">店舗ログイン</h1>
      <p class="lede" data-i18n="merchantLoginLede">请输入门店识别码…</p>
    </header>

    <form class="login-card" id="loginForm">
      <label class="login-label" for="accessCode" data-i18n="storeCode">店舗コード</label>
      <input class="login-input" id="accessCode" name="accessCode" autocomplete="off" placeholder="RUANA88" required>
      <p class="login-err" id="loginErr" hidden></p>
      <button class="login-btn" type="submit" data-i18n="enterMerchant">店舗側へ</button>
      <div class="login-hint">
        <p data-i18n="testCodes">テスト用コード（非公式）：</p>
        <ul>
          <li><code>RUANA88</code> → Relaxation Ruana</li>
          <li><code>STARRY88</code> → Starry Flow Spa</li>
          <li><code>LUNA88</code> → Luna spa 河原町店</li>
        </ul>
      </div>
    </form>
  </main>

  <script src="stores.js"></script>
  <script src="desk-i18n.js"></script>
  <script>
    DeskI18n.mountSwitch(document.getElementById('portalLangMount'));
    DeskI18n.onChange(() => {
      DeskI18n.applyDom();
      document.title = DeskI18n.t('merchantLoginTitle');
    });
    document.title = DeskI18n.t('merchantLoginTitle');
    DeskI18n.applyDom();

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const err = document.getElementById('loginErr');
      const code = document.getElementById('accessCode').value;
      const store = StoreRegistry.findByAccessCode(code);
      if (!store) {
        err.hidden = false;
        err.textContent = DeskI18n.t('loginErr');
        return;
      }
      StoreRegistry.applyStore(store.storeId);
      StoreRegistry.setRole('merchant');
      location.href = 'merchant.html?store=' + encodeURIComponent(store.storeId);
    });
  </script>
</body>
</html>
