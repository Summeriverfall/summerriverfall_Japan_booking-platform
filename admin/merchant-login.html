<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body class="portal-body">
  <div class="portal-bg" aria-hidden="true"></div>
  <main class="portal-shell portal-shell-narrow">
    <header class="portal-hero portal-hero-sm">
      <a class="back-link" href="index.html">← 返回平台入口</a>
      <p class="eyebrow">Merchant</p>
      <h1>商家登录</h1>
      <p class="lede">请输入门店识别码。测试版无真实鉴权，仅做流程验证。</p>
    </header>

    <form class="login-card" id="loginForm">
      <label class="login-label" for="accessCode">门店识别码</label>
      <input class="login-input" id="accessCode" name="accessCode" autocomplete="off" placeholder="输入识别码" required>
      <p class="login-err" id="loginErr" hidden></p>
      <button class="login-btn" type="submit">进入商家端</button>
      <div class="login-hint">
        <p>测试识别码（非正式）：</p>
        <ul>
          <li><code>RUANA88</code> → Relaxation Ruana</li>
          <li><code>STARRY88</code> → Starry Flow Spa</li>
          <li><code>LUNA88</code> → Luna spa 河原町店</li>
        </ul>
      </div>
    </form>
  </main>

  <script src="stores.js?v=20260722-luna"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const err = document.getElementById('loginErr');
      const code = document.getElementById('accessCode').value;
      const store = StoreRegistry.findByAccessCode(code);
      if (!store) {
        err.hidden = false;
        err.textContent = '识别码无效，请核对后重试。';
        return;
      }
      StoreRegistry.applyStore(store.storeId);
      StoreRegistry.setRole('merchant');
      location.href = 'merchant.html?store=' + encodeURIComponent(store.storeId);
    });
  </script>
</body>
</html>
