<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>スタッフ作業記録</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tech.css">
</head>
<body class="tech-body">
  <div class="tech-shell">
    <header class="tech-top">
      <div class="tech-brand">
        <h1 id="pageTitle">スタッフ作業記録</h1>
        <div class="sub" id="pageSub">—</div>
      </div>
      <div class="tech-top-actions">
        <div class="lang-switch" id="langSwitch" aria-label="Language">
          <button type="button" data-lang="jp">JP</button>
          <button type="button" data-lang="cn">中</button>
          <button type="button" data-lang="en">EN</button>
        </div>
        <button type="button" class="btn-ghost" id="btnLogout" data-i18n="logout">ログアウト</button>
      </div>
    </header>

    <!-- 今日安排总览（置顶） -->
    <section class="day-overview" id="dayOverview" aria-labelledby="dayOverviewTitle">
      <div class="day-overview-head">
        <div>
          <h2 class="day-overview-title" id="dayOverviewTitle" data-i18n="tabBoard">本日の配置</h2>
          <p class="day-overview-count" id="dayCount">—</p>
        </div>
        <div class="day-overview-tools">
          <label class="date-field">
            <span data-i18n="today">営業日</span>
            <input type="date" id="dateInput">
          </label>
          <div class="filter-row" id="viewFilter">
            <button type="button" class="is-on" data-view="time" data-i18n="byTime">時間順</button>
            <button type="button" data-view="tech" data-i18n="byTech">スタッフ別</button>
          </div>
          <button type="button" class="btn-ghost" id="btnRefresh" data-i18n="refresh">更新</button>
        </div>
      </div>
      <div class="day-overview-body" id="boardRoot"></div>
    </section>

    <!-- 记工：同一页选技师 / 资源 / 时间 / 项目 -->
    <section class="log-sheet" aria-labelledby="logSheetTitle">
      <div class="log-sheet-head">
        <h2 class="log-sheet-title" id="logSheetTitle" data-i18n="tabLog">記録する</h2>
        <div class="pick-summary" id="pickSummary"></div>
      </div>

      <div class="pick-block">
        <div class="section-label" data-i18n="pickTech">スタッフ</div>
        <div class="tap-grid tap-grid--people" id="techGrid"></div>
      </div>

      <div class="pick-block">
        <div class="section-label" data-i18n="pickResource">どの部屋／ベッド？</div>
        <div class="tap-grid" id="resourceGrid"></div>
      </div>

      <div class="pick-block pick-block--time">
        <div class="time-col">
          <div class="section-label" data-i18n="pickStart">開始時刻</div>
          <div class="time-grid" id="startGrid"></div>
        </div>
        <div class="dur-col">
          <div class="section-label" data-i18n="pickDuration">施術時間</div>
          <div class="dur-row" id="durRow"></div>
        </div>
      </div>

      <div class="pick-block">
        <div class="section-label" data-i18n="pickCourse">コース（タップで自動送信）</div>
        <p class="section-hint" id="courseHint" data-i18n="courseHint"></p>
        <div class="course-grid" id="courseGrid"></div>
      </div>
    </section>
  </div>

  <div class="tech-toast" id="toast" role="status" aria-live="polite"></div>

  <script src="stores.js"></script>
  <script src="store.js"></script>
  <script src="tech-i18n.js"></script>
  <script src="tech-work.js"></script>
  <script src="tech-app.js"></script>
</body>
</html>
