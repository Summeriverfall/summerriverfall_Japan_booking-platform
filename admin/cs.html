<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カスタマー対応</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="brand" id="pageBrand">カスタマー対応<div class="hint" style="margin:0" id="pageSub">…</div></div>
    <div class="topbar-right">
      <div class="lang-switch" id="langSwitch" role="group" aria-label="Language">
        <button type="button" data-lang="jp">JP</button>
        <button type="button" data-lang="cn">中</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <nav class="nav">
        <a href="admin-portal.html" data-i18n="switchStore">店舗切替</a>
        <a class="active" href="#" id="navCs" data-i18n="csBoard">予約ボード</a>
        <a href="index.html" data-i18n="hubEntry">入口</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <div class="field">
        <label data-i18n="businessDay">営業日</label>
        <input type="date" id="dateInput">
      </div>
      <div class="field">
        <label data-i18n="dailyEmailTime">毎日の店舗メール（日本時間）</label>
        <input type="time" id="dailyEmailTime" value="00:00">
      </div>
      <button class="btn" type="button" id="btnSaveDailyTime" data-i18n="saveDailyTime">送信時刻を保存</button>
      <button class="btn" type="button" id="btnPreviewDigest" data-i18n="previewDigest">日次サマリーをプレビュー</button>
      <button class="btn" type="button" id="btnRefresh" data-i18n="refreshBoard">ボード更新</button>
      <button class="btn ghost" type="button" id="btnExport" data-i18n="exportData">データ書き出し</button>
      <button class="btn danger" type="button" id="btnReset" data-i18n="resetData">当店のテストデータを消去</button>
      <span class="hint" id="remainHint"></span>
    </div>

    <div class="grid-stack">
      <section class="card card-board">
        <h2 data-i18n="csBoardTitle">ベッド時間軸</h2>
        <p class="hint" data-i18n="csBoardHint">空档拖选可新建…</p>
        <div id="board"></div>
      </section>

      <section class="card card-form">
        <h2 data-i18n="waPasteTitle">WhatsApp 予約の貼り付け</h2>
        <p class="hint" data-i18n="waPasteHint">粘贴确认信…</p>
        <textarea id="waPaste" class="wa-paste" data-i18n-placeholder="waPastePh" placeholder="…"></textarea>
        <div class="form-actions" style="margin-top:.6rem">
          <button class="btn primary" type="button" id="btnParseWa" data-i18n="btnParseWa">解析して側欄へ</button>
          <button class="btn" type="button" id="btnParseWaCreate" data-i18n="btnParseWaCreate">解析して直接作成</button>
        </div>
        <div class="err" id="waErr"></div>

        <h3 data-i18n="ordersToday">当日オーダー</h3>
        <div class="list" id="bookingList"></div>
        <div class="err" id="formErr"></div>
      </section>
    </div>

    <section class="card" style="margin-top:1rem" id="emailPanel">
      <h2 data-i18n="emailPanelTitle">店舗メール / カレンダー同期</h2>
      <p class="hint" data-i18n="emailPanelHint">确认或改期后在此预览…</p>
      <div class="email-box" id="emailBox">
        <div class="hint" data-i18n="emailEmpty">暂无预览。</div>
      </div>
    </section>
  </main>

  <div class="ctx-menu" id="sidePanel" aria-hidden="true" hidden>
    <div class="ctx-menu-head">
      <div>
        <strong id="sideTitle" data-i18n="sideBookingEdit">予約編集</strong>
        <p class="hint" id="sideHint" style="margin:0" data-i18n="sideHintEdit">选中后可在此修改</p>
      </div>
    </div>
    <div class="ctx-menu-body" id="sideBodyBooking">
      <div class="side-field"><label data-i18n="sideStartTime">開始時刻</label><input id="startTime" type="time"></div>
      <div class="side-field"><label data-i18n="sideDuration">時間（分）</label><input id="duration" type="number" min="30" step="30" value="60"></div>
      <div class="side-field"><label data-i18n="sideGuests">人数</label><input id="guests" type="number" min="1" max="5" value="1"></div>
      <div class="side-field"><label data-i18n="sideBeds">指定ベッド</label><div class="bed-checks" id="sideBeds"></div></div>
      <div class="side-field"><label data-i18n="sideCourse">コース</label><select id="course"></select></div>
      <div class="side-field"><label data-i18n="sideChannel">チャネル</label><select id="channel"></select></div>
      <div class="side-field"><label data-i18n="sideGuestName">お客様名</label><input id="guestName" data-i18n-placeholder="optional" placeholder="任意"></div>
      <div class="side-field"><label data-i18n="sideGuestPhone">電話 / WhatsApp</label><input id="guestPhone" data-i18n-placeholder="optional" placeholder="任意"></div>
      <div class="side-field"><label data-i18n="sideNote">メモ</label><textarea id="note" data-i18n-placeholder="notePh" placeholder="…"></textarea></div>
      <p class="hint warn" id="multiHint" data-i18n="multiHint">≥2 人…</p>
      <div class="err" id="sideErr"></div>
    </div>
    <div class="ctx-menu-body" id="sideBodyOpenReq" hidden>
      <p class="hint" id="openReqDetail" style="margin:0" data-i18n="openReqDetail">商家已关闭…</p>
      <div class="side-field"><label data-i18n="openReqNote">申請メモ（任意）</label><textarea id="openReqNote" data-i18n-placeholder="openReqNotePh" placeholder="…"></textarea></div>
      <div class="err" id="openReqErr"></div>
    </div>
    <div class="ctx-menu-foot">
      <button type="button" class="btn" id="btnHold" data-i18n="btnHold">仮押さえのみ</button>
      <button type="button" class="btn primary" id="btnCreate" data-i18n="btnCreate">予約作成</button>
      <button type="button" class="btn primary" id="btnConvertHold" hidden data-i18n="btnConvertHold">予約に変換</button>
      <button type="button" class="btn danger" id="btnDeleteBooking" hidden data-i18n="btnDeleteBooking">予約削除</button>
      <button type="button" class="btn primary" id="btnRequestOpen" hidden data-i18n="btnRequestOpen">オープン申請＋メール下書き</button>
    </div>
  </div>

  <script src="stores.js"></script>
  <script src="store.js"></script>
  <script src="desk-i18n.js"></script>
  <script src="board-render.js"></script>
  <script src="wa-parse.js"></script>
  <script src="email-config.js"></script>
  <script src="email-client.js"></script>
  <script src="cs-app.js"></script>
</body>
</html>
