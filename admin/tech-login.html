<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>スタッフログイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
  <link rel="stylesheet" href="tech.css">
</head>
<body class="portal-body">
  <div class="portal-bg" aria-hidden="true"></div>
  <main class="portal-shell portal-shell-narrow">
    <header class="portal-hero portal-hero-sm">
      <a class="back-link" href="index.html" data-i18n="backHome">← 入口へ戻る</a>
      <div class="tech-top-actions" style="margin-bottom:.75rem">
        <div class="lang-switch" id="langSwitch" aria-label="Language">
          <button type="button" data-lang="jp">JP</button>
          <button type="button" data-lang="cn">中</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
      <p class="eyebrow">Staff</p>
      <h1 data-i18n="loginTitle">スタッフログイン</h1>
      <p class="lede" data-i18n="loginSub">店舗コードを入力（スタッフは作業画面で選択）</p>
    </header>

    <form class="login-card" id="loginForm">
      <label class="login-label" for="storeCode" data-i18n="storeCode">店舗コード</label>
      <input class="login-input" id="storeCode" name="storeCode" autocomplete="off" placeholder="RUANA88" required>

      <p class="login-err" id="loginErr" hidden></p>
      <button class="login-btn" type="submit" data-i18n="loginBtn" style="background:#4a6b52">入る</button>

      <div class="login-hint">
        <p data-i18n="testHint">テストコード例</p>
        <ul>
          <li><code>RUANA88</code></li>
          <li><code>STARRY88</code></li>
          <li><code>LUNA88</code></li>
        </ul>
      </div>
    </form>
  </main>

  <script src="stores.js"></script>
  <script src="tech-i18n.js"></script>
  <script>
    function applyI18n() {
      const lang = TechI18n.getLang();
      document.documentElement.lang = lang === 'jp' ? 'ja' : lang === 'cn' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = TechI18n.t(el.getAttribute('data-i18n'));
      });
      document.querySelectorAll('#langSwitch button').forEach((btn) => {
        btn.classList.toggle('is-on', btn.dataset.lang === lang);
      });
      document.title = TechI18n.t('loginTitle');
    }

    document.getElementById('langSwitch').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-lang]');
      if (!btn) return;
      TechI18n.setLang(btn.dataset.lang);
      applyI18n();
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const err = document.getElementById('loginErr');
      const storeCode = document.getElementById('storeCode').value;
      const store = StoreRegistry.findByAccessCode(storeCode);
      if (!store) {
        err.hidden = false;
        err.textContent = TechI18n.t('loginErr');
        return;
      }
      StoreRegistry.applyStore(store.storeId);
      StoreRegistry.setRole('technician');
      StoreRegistry.setTechnician(null);
      location.href = 'tech.html?store=' + encodeURIComponent(store.storeId);
    });

    applyI18n();
  </script>
</body>
</html>
